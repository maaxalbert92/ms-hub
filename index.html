<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07111f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MA Hub" />
  <title>MA Operations Hub</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero-top">
        <div class="brand-mark">MA</div>
        <div>
          <p class="eyebrow">Carmo Energy</p>
          <h1>MA Operations Hub</h1>
          <p class="subtitle">Max Albert · Supervisor de Produção Sênior</p>
        </div>
      </div>
      <div class="hero-grid">
        <div class="status-card">
          <span>Central operacional</span>
          <strong id="systemsCount">0 sistemas</strong>
        </div>
        <div class="status-card">
          <span>Versão</span>
          <strong>1.0</strong>
        </div>
      </div>
      <label class="search-box" for="searchInput">
        <span>⌕</span>
        <input id="searchInput" type="search" placeholder="Pesquisar sistema, categoria ou palavra-chave..." autocomplete="off" />
      </label>
    </header>

    <main>
      <section class="section-block" id="favoritesSection">
        <div class="section-title">
          <div>
            <p class="eyebrow">Acesso rápido</p>
            <h2>Favoritos</h2>
          </div>
        </div>
        <div class="cards-grid" id="favoritesGrid"></div>
      </section>

      <section class="section-block">
        <div class="section-title">
          <div>
            <p class="eyebrow">Sistemas</p>
            <h2>Todos os acessos</h2>
          </div>
          <button class="ghost-button" id="clearSearch" type="button">Limpar busca</button>
        </div>
        <div id="categoryGroups"></div>
        <p class="empty-state" id="emptyState" hidden>Nenhum sistema encontrado para essa busca.</p>
      </section>
    </main>

    <footer>
      <span>MA Operations Hub · Uso operacional</span>
      <span>GitHub Pages / PWA</span>
    </footer>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
